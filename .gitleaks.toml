# Gitleaks configuration
title = "DevSecOps Pipeline Gitleaks Config"

[allowlist]
description = "Global allowlist"
regexes = [
  "change-me-in-production",
  "your-sonarqube-token",
  "your-github-token",
]

[allowlist.paths]
paths = [
  ".env.example",
  "docs/06-findings.md",
  "reports/",
  ".secrets.baseline",
]
